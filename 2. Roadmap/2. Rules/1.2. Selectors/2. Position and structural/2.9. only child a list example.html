<!DOCTYPE html>

<html lang="en">
    <head>
        <style>
            :root {
                color-scheme: light dark;
            }

            li li {
                list-style-type: disc;
            }

            li:only-child {
                color: #ff0000;
                list-style-type: square;
            }
        </style>
    </head>
    <body>
        <ol>
            <li>
                First
                <ul>
                    <li>This list has just one element.</li>
                </ul>
            </li>
            <li>
                Second
                <ul>
                    <li>This list has three elements.</li>
                    <li>This list has three elements.</li>
                    <li>This list has three elements.</li>
                </ul>
            </li>
        </ol>
    </body>
</html>
