<!DOCTYPE html>

<html lang="en">
    <head>
        <style>
            :root {
                color-scheme: light dark;
            }

            div:empty {
                outline: 2px solid deeppink;
                height: 1em;
            }
        </style>
    </head>
    <body>
        <p>Element with no content:</p>
        <div></div>
        <p>Element with comment:</p>
        <div><!-- A comment --></div>
        <p>Element with nested empty element:</p>
        <div><p></p></div>
    </body>
</html>
