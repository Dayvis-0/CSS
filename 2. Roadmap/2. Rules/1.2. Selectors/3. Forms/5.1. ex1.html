<!DOCTYPE html>

<html lang="en">
    <head>
        <style>
            :root {
                color-scheme: light dark;
            }

            label {
                display: block;
                margin: 1px;
                padding: 1px;
            }

            .field {
                margin: 1px;
                padding: 1px;
            }

            input:invalid {
                background-color: #ffdddd;
                color: #000000;
            }
            
            form:invalid {
                border: 5px solid #ffdddd;
            }

            input:valid {
                background-color: #ddffdd;
                color: #000000;
            }

            form:valid {
                border: 5px solid #ddffdd;
            }

            input:required {
                border-color: maroon;
                border-width: 3px;
            }

            input:required:valid {
                border-color: #c00000;
            }
        </style>
    </head>
    <body>
        <form>
            <div class="field">
                <label for="url_input">Enter a URL</label>
                <input type="url" id="url_input">
            </div>
            <div class="field">
                <label for="email_input">Enter an email address:</label>
                <input type="email" id="email_input" required>
            </div>
        </form>
    </body>
</html>
