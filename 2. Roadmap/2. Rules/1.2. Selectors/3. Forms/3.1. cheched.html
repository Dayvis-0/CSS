<!DOCTYPE html>

<html lang="en">
    <head>
        <style>
            :root {
                color-scheme: light dark;
            }
            label, input[type="submit"] {
                display: block;
                margin-top: 1em;
            }

            input:checked {
                border: none;
                outline: 2px solid #ff0050;
            }
        </style>
    </head>
    <body>
        <form>
            <p>How did you find about us?</p>
            <label>
                <input name="origin" type="radio" value="google" checked>
                Google
            </label>            
            <label>
                <input name="origin" type="radio" value="facebook" >
                Facebook
            </label>            
            <p>Please agree to out terms:</p>
            <label>
                <input name="newsletter" type="checkbox" checked>
                I want to subscribe to a personalized newsletter
            </label>
            <label>
                <input name="privacy" type="checkbox">
                I have read and I agree to the Privacy Policy
            </label>
            <input type="submit" value="Submit form">
        </form>
    </body>
</html>
