<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>:checked</title>
        <link rel="stylesheet" href="checked.css">
    </head>
    <body>
        <h1>:checked</h1>
        <!--El selector de pseudoclase CSS :checked representa cualquier opción (<input type="radio">),
        casilla de verificación (<input type="checkbox">) u opción (<option> en un elemento <select>)
        que esté marcada o activada.-->
        <p>
            The <strong><code>:checked</code></strong> CSS pseudo-class selector represents any radio 
            (<code>&lt;input type="radio"&gt;</code> ), checkbox (<code>&lt;input type="checkbox"&gt;</code> ), 
            or option (<code>&lt;option&gt;</code> in a <code>&lt;select&gt;</code> element) that is 
            checked or toggled to an on state.
        </p>
        <iframe id="iframe-1" src="3.1. checked.html"></iframe>
        <h2>Syntax</h2>
<pre>
:checked {
  /* ... */
}
</pre>
    </body>
</html>
